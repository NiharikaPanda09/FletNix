<div class="min-h-screen flex items-center justify-center bg-radial-gradient bg-slate-950 relative overflow-hidden"
     style="background-image: radial-gradient(circle, #1e1b4b 0%, #020617 100%);">
  
  <!-- Ambient background glow elements -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-red-600/10 blur-[120px] -top-40 -left-40"></div>
  <div class="absolute w-[400px] h-[400px] rounded-full bg-indigo-600/10 blur-[100px] -bottom-20 -right-20"></div>

  <!-- Main glass container -->
  <div class="w-full max-w-md mx-4 z-10">
    
    <!-- Title / Logo Area -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-black tracking-wider text-red-600 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] select-none">
        FLETN<span class="text-white">IX</span>
      </h1>
      <p class="text-sm text-slate-400 mt-2 font-medium">Your Personal Netflix Show Finder</p>
    </div>

    <!-- Card -->
    <div class="backdrop-blur-xl bg-slate-900/80 border border-slate-800 rounded-3xl p-8 shadow-2xl transition-all duration-300">
      
      <!-- Tab Header -->
      <div class="flex justify-center mb-6">
        <button (click)="isLoginMode = true; errorMessage = ''; successMessage = ''"
                [class]="isLoginMode ? 'text-red-500 border-red-500 font-bold' : 'text-slate-400 hover:text-slate-200 border-transparent'"
                class="flex-1 text-center py-2 text-lg border-b-2 font-semibold transition-all duration-200 focus:outline-none">
          Sign In
        </button>
        <button (click)="isLoginMode = false; errorMessage = ''; successMessage = ''"
                [class]="!isLoginMode ? 'text-red-500 border-red-500 font-bold' : 'text-slate-400 hover:text-slate-200 border-transparent'"
                class="flex-1 text-center py-2 text-lg border-b-2 font-semibold transition-all duration-200 focus:outline-none">
          Register
        </button>
      </div>

      <!-- Messages -->
      <div *ngIf="errorMessage" class="mb-4 p-4 rounded-xl bg-red-950/50 border border-red-800/80 text-red-400 text-sm flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <div *ngIf="successMessage" class="mb-4 p-4 rounded-xl bg-green-950/50 border border-green-800/80 text-green-400 text-sm flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Auth Form -->
      <form (ngSubmit)="onSubmit()" #authForm="ngForm" class="space-y-5">
        
        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="email">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
              </svg>
            </span>
            <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="name@example.com"
                   class="w-full pl-11 pr-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl focus:border-red-500 focus:ring-1 focus:ring-red-500 text-white placeholder-slate-500 outline-none transition-all duration-200">
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="password">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </span>
            <input type="password" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••"
                   class="w-full pl-11 pr-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl focus:border-red-500 focus:ring-1 focus:ring-red-500 text-white placeholder-slate-500 outline-none transition-all duration-200">
          </div>
        </div>

        <!-- Age (Register Mode Only) -->
        <div *ngIf="!isLoginMode" class="transition-all duration-200">
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="age">Your Age</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </span>
            <input type="number" id="age" name="age" [(ngModel)]="age" required min="1" max="120" placeholder="18"
                   class="w-full pl-11 pr-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl focus:border-red-500 focus:ring-1 focus:ring-red-500 text-white placeholder-slate-500 outline-none transition-all duration-200">
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" [disabled]="loading"
                class="w-full py-3.5 mt-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all duration-150 transform active:scale-98 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:ring-2 focus:ring-red-500 shadow-lg shadow-red-600/30">
          <span *ngIf="!loading">{{ isLoginMode ? 'Sign In' : 'Create Account' }}</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Processing...
          </span>
        </button>

      </form>

      <!-- Footer Help -->
      <div class="mt-6 text-center text-xs text-slate-500 font-medium">
        {{ isLoginMode ? "New to FletNix?" : "Already have an account?" }}
        <button (click)="toggleMode()" class="text-red-400 hover:text-red-300 font-bold ml-1 outline-none">
          {{ isLoginMode ? "Register now" : "Sign In" }}
        </button>
      </div>

    </div>



  </div>
</div>
